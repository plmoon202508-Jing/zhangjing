name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Build Debug APK
        run: |
          cd android
          curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          unzip gradle.zip
          export PATH=$PWD/gradle-8.2/bin:$PATH
          gradle assembleDebug --stacktrace
      
      - name: List build outputs
        run: |
          echo "Listing build directory:"
          find android/app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: satellite-app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
        if: always()
