<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地球模型挑选 · 亚信卫星时刻</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #03040a; color: #eaf6ff; font-family: "Noto Sans SC", system-ui, sans-serif; overflow: hidden; }
    #c { position: fixed; inset: 0; display: block; }
    .bar { position: fixed; top: 0; left: 0; right: 0; z-index: 10; display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; background: linear-gradient(180deg, rgba(3,4,10,.85), transparent); }
    .bar button { padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 14px; color: #cfe6ff;
      background: rgba(18,28,54,.6); border: 1px solid rgba(120,200,255,.25); backdrop-filter: blur(8px); transition: .2s; }
    .bar button.active { color: #021018; background: linear-gradient(90deg,#2de2ff,#6ef0ff); border-color: transparent; font-weight: 600; box-shadow: 0 0 16px rgba(45,226,255,.5); }
    .info { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 16px 18px 22px; text-align: center;
      background: linear-gradient(0deg, rgba(3,4,10,.9), transparent); }
    .info h2 { font-size: 18px; font-weight: 500; letter-spacing: 1px; }
    .info p { font-size: 12px; color: #8aa0c0; margin-top: 6px; }
    .hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #8aa0c0; font-size: 13px; z-index: 5; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="bar" id="bar"></div>
  <div class="info"><h2 id="title">—</h2><p id="desc"></p></div>
  <div class="hint" id="hint">加载中...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(2, devicePixelRatio));
  if ('outputEncoding' in renderer) renderer.outputEncoding = THREE.sRGBEncoding;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.z = 3.1;

  const sun = new THREE.DirectionalLight(0xffffff, 1.15); sun.position.set(5, 2.5, 4); scene.add(sun);
  const amb = new THREE.AmbientLight(0x6a86a0, 0.55); scene.add(amb);

  const loader = new THREE.TextureLoader();
  const srgb = t => { if ('encoding' in t) t.encoding = THREE.sRGBEncoding; return t; };
  const T = {
    sscDay: srgb(loader.load('textures/ssc_2k_earth_daymap.jpg')),
    sscNight: srgb(loader.load('textures/ssc_2k_earth_nightmap.jpg')),
    sscClouds: loader.load('textures/ssc_2k_earth_clouds.jpg'),
    tjDay: srgb(loader.load('textures/earth_atmos_2048.jpg')),
    tjSpec: loader.load('textures/earth_specular_2048.jpg'),
    tjClouds: loader.load('textures/earth_clouds_1024.png')
  };

  const R = 1.0;
  let root = new THREE.Group(); scene.add(root);
  let globe = null, clouds = null;

  function clear() {
    if (globe) { root.remove(globe); globe.traverse(o => { o.geometry && o.geometry.dispose(); o.material && o.material.dispose(); }); }
    globe = null; clouds = null;
  }
  function atmosphere(scale, color) {
    return new THREE.Mesh(
      new THREE.SphereGeometry(R * scale, 48, 48),
      new THREE.ShaderMaterial({
        transparent: true, side: THREE.BackSide, blending: THREE.AdditiveBlending,
        uniforms: { c: { value: new THREE.Color(color) } },
        vertexShader: 'varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }',
        fragmentShader: 'uniform vec3 c; varying vec3 vN; void main(){ float i=pow(0.72-dot(vN,vec3(0,0,1.0)),3.0); gl_FragColor=vec4(c,1.0)*i; }'
      })
    );
  }
  function addClouds(tex, opacity) {
    clouds = new THREE.Mesh(
      new THREE.SphereGeometry(R * 1.012, 64, 48),
      new THREE.MeshPhongMaterial({ map: tex, transparent: true, opacity, depthWrite: false })
    );
    globe.add(clouds);
  }

  /* ---------- 各种风格 ---------- */
  const STYLES = [
    {
      name: '① 明亮蓝星 (无光照·全亮)',
      desc: '海洋大陆始终明亮可见，最直观；附青色大气辉光 + 云层',
      build() {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 64, 48),
          new THREE.MeshBasicMaterial({ map: T.sscDay })));
        g.add(atmosphere(1.18, 0x2de2ff));
        globe = g; root.add(g); addClouds(T.sscClouds, 0.4);
      }
    },
    {
      name: '② 写实昼夜 (太阳光照·夜面城市灯光)',
      desc: '白天面真实光照，夜面显示城市灯光，最有真实感',
      build() {
        const mat = new THREE.ShaderMaterial({
          uniforms: { dayTex: { value: T.sscDay }, nightTex: { value: T.sscNight }, sunDir: { value: new THREE.Vector3(1, 0.35, 0.7).normalize() } },
          vertexShader: `varying vec2 vUv; varying vec3 vNW;
            void main(){ vUv=uv; vNW=normalize(mat3(modelMatrix)*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
          fragmentShader: `uniform sampler2D dayTex,nightTex; uniform vec3 sunDir; varying vec2 vUv; varying vec3 vNW;
            void main(){ float l=dot(normalize(vNW),sunDir); float m=smoothstep(-0.12,0.28,l);
              vec3 day=texture2D(dayTex,vUv).rgb; vec3 night=texture2D(nightTex,vUv).rgb*1.6;
              gl_FragColor=vec4(mix(night,day,m),1.0);} `
        });
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 64, 48), mat));
        g.add(atmosphere(1.18, 0x3aa0ff));
        globe = g; root.add(g); addClouds(T.sscClouds, 0.35);
      }
    },
    {
      name: '③ 写实 Phong (海洋高光)',
      desc: '方向光 + 环境光，海洋有镜面反光，立体感强',
      build() {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 64, 48),
          new THREE.MeshPhongMaterial({ map: T.sscDay, specularMap: T.tjSpec, specular: new THREE.Color(0x335577), shininess: 18, emissive: 0x0b1426, emissiveIntensity: 0.4 })));
        g.add(atmosphere(1.18, 0x2de2ff));
        globe = g; root.add(g); addClouds(T.sscClouds, 0.4);
      }
    },
    {
      name: '④ 全息·青蓝 (科技风)',
      desc: '真实大陆 + 青蓝色调 + 经纬线框 + 强大气辉光，贴合 App 全息风',
      build() {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 64, 48),
          new THREE.MeshBasicMaterial({ map: T.sscDay })));
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R * 1.001, 48, 32),
          new THREE.MeshBasicMaterial({ color: 0x2de2ff, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending })));
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R * 1.004, 36, 24),
          new THREE.MeshBasicMaterial({ color: 0x6ef0ff, wireframe: true, transparent: true, opacity: 0.12 })));
        g.add(atmosphere(1.22, 0x2de2ff));
        globe = g; root.add(g); addClouds(T.sscClouds, 0.25);
      }
    },
    {
      name: '⑤ 三维线框 (原点阵风格)',
      desc: '此前的全息点阵风格，作为对比参考',
      build() {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R * 0.99, 48, 48), new THREE.MeshBasicMaterial({ color: 0x040a1c })));
        g.add(new THREE.Mesh(new THREE.SphereGeometry(R, 36, 24), new THREE.MeshBasicMaterial({ color: 0x2de2ff, wireframe: true, transparent: true, opacity: 0.18 })));
        const geo = new THREE.BufferGeometry(), pos = [];
        for (let i = 0; i < 1600; i++) { const u = Math.random(), v = Math.random(), th = 2 * Math.PI * u, ph = Math.acos(2 * v - 1), r = R * 1.002; pos.push(r * Math.sin(ph) * Math.cos(th), r * Math.cos(ph), r * Math.sin(ph) * Math.sin(th)); }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        g.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x6ef0ff, size: 0.018, transparent: true, opacity: 0.55 })));
        g.add(atmosphere(1.18, 0x2de2ff));
        globe = g; root.add(g);
      }
    }
  ];

  let cur = 0;
  function select(i) {
    cur = i; location.hash = i; clear(); STYLES[i].build();
    document.getElementById('title').textContent = STYLES[i].name;
    document.getElementById('desc').textContent = STYLES[i].desc;
    [...document.querySelectorAll('.bar button')].forEach((b, k) => b.classList.toggle('active', k === i));
    document.getElementById('hint').style.display = 'none';
  }

  const bar = document.getElementById('bar');
  STYLES.forEach((s, i) => { const b = document.createElement('button'); b.textContent = s.name.split(' ')[0] + ' ' + s.name.replace(/^\S+\s/, '').replace(/\s*\(.*/, ''); b.onclick = () => select(i); bar.appendChild(b); });

  /* 交互旋转 */
  let rot = { x: -0.25, y: 0 }, auto = true, drag = false, lx, ly;
  canvas.addEventListener('pointerdown', e => { drag = true; lx = e.clientX; ly = e.clientY; auto = false; });
  addEventListener('pointermove', e => { if (!drag) return; rot.y += (e.clientX - lx) * 0.005; rot.x = Math.max(-1.4, Math.min(1.4, rot.x + (e.clientY - ly) * 0.005)); lx = e.clientX; ly = e.clientY; });
  addEventListener('pointerup', () => { drag = false; setTimeout(() => auto = true, 2500); });
  canvas.addEventListener('wheel', e => { e.preventDefault(); camera.position.z = Math.max(1.6, Math.min(6, camera.position.z + e.deltaY * 0.002)); }, { passive: false });

  function resize() { const w = innerWidth, h = innerHeight; renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
  addEventListener('resize', resize); resize();

  function loop() {
    if (auto) rot.y += 0.0015;
    root.rotation.x = rot.x; root.rotation.y = rot.y;
    if (clouds) clouds.rotation.y += 0.0004;
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }
  const h = parseInt((location.hash || '').replace('#', ''), 10);
  select(Number.isInteger(h) && STYLES[h] ? h : 0);
  loop();
  </script>
</body>
</html>
